<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offsets — Leviathan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body class="page">
  <header class="bar bar-wide">
    <a class="back" href="index.html">← Leviathan</a>
  </header>

  <main class="content offsets-page">
    <h1>Offsets</h1>
    <p class="lede">Browse FFlag offsets by Roblox client version.</p>

    <div class="offsets-controls">
      <div class="field">
        <span>Version</span>
        <div class="version-picker" id="version-picker">
          <button type="button" class="version-trigger" id="version-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="version-trigger-text">
              <span class="version-label">client</span>
              <span class="version-value" id="version-value">Select a version…</span>
            </span>
            <span class="version-chevron" aria-hidden="true"></span>
          </button>
          <div class="version-menu" id="version-menu" role="listbox" hidden></div>
        </div>
      </div>

      <label class="field field-grow">
        <span>Search</span>
        <div class="search-shell">
          <span class="search-prefix" aria-hidden="true">~/flags</span>
          <input id="flag-search" type="search" placeholder="grep flag name…" disabled autocomplete="off" />
        </div>
      </label>
    </div>

    <p class="offsets-meta" id="offsets-meta">14 versions ready</p>

    <section class="code-panel" aria-label="Flag offsets">
      <div class="code-panel-bar">
        <span class="dot red"></span>
        <span class="dot amber"></span>
        <span class="dot green"></span>
        <span class="code-panel-title" id="code-panel-title">offsets.json</span>
      </div>
      <div class="code-panel-body" id="offsets-body">
        <div class="code-empty">No data yet — select a version</div>
      </div>
    </section>
  </main>

  <script type="application/json" id="versions-data">

  "version-76173e47a79145c7",
  "version-5cf2272675e145f5",
  "version-4b6315bf1f0a4dbb",
  "version-460909c4fe904aae",
  "version-36a2600cebf1487d",
  "version-2b1721d47abf49aa",
  "version-1a951716f19e4638"
]
  </script>
  <script src="offsets.js?v=3"></script>
</body>
</html>
